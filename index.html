<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">
<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:#0f172a;
  font-family:system-ui;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

#player {
  width:100%;
  height:500px;
  background:black;
  border-radius:12px;
  overflow:hidden;
}

.controls {
  margin-top:15px;
  padding:10px;
}

select {
  background:#1e293b;
  color:white;
  border:none;
  padding:6px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎬 Vyla Player</h2>

  <div id="player"></div>

  <div class="controls">
    <label>Quality:</label>
    <select id="quality">
      <option value="-1">Auto</option>
    </select>
  </div>
</div>

<script>
const BASE = "https://vyla-api.pages.dev";

const params = new URLSearchParams(location.search);
const id = params.get("id");
const isTv = params.get("type") === "tv";
const season = params.get("season") || 1;
const episode = params.get("episode") || 1;

if (!id) {
  document.body.innerHTML = "<h2 style='text-align:center'>❌ Missing ID</h2>";
  throw new Error("Missing ID");
}

const url = isTv
  ? `${BASE}/api/tv?id=${id}&season=${season}&episode=${episode}`
  : `${BASE}/api/movie?id=${id}`;

let art;
let hls;
let sources = [];
let currentIndex = 0;

// FETCH SOURCES
fetch(url)
  .then(r => r.json())
  .then(data => {
    if (!data.sources?.length) throw new Error("No sources found");

    sources = data.sources;
    loadSource(0);
  })
  .catch(err => {
    document.body.innerHTML = `<h2 style="text-align:center">${err.message}</h2>`;
  });

// QUALITY SETUP (YOUR FIXED LOGIC)
function setupQualitySelector(hls, selectEl) {

  hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {

    selectEl.innerHTML = '<option value="-1">Auto</option>';

    data.levels.forEach((level, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent =
        (level.height ? level.height + 'p' : 'Auto') +
        ' (' + Math.round(level.bitrate / 1000) + 'kbps)';

      selectEl.appendChild(opt);
    });

    selectEl.onchange = () => {
      const val = parseInt(selectEl.value);
      hls.currentLevel = val;
    };
  });

  hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
    if (hls.autoLevelEnabled) {
      selectEl.value = '-1';
    } else {
      selectEl.value = data.level;
    }
  });
}

// LOAD SOURCE
function loadSource(index) {
  currentIndex = index;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  const stream = BASE + sources[index].url;

  if (art) art.destroy();

  art = new Artplayer({
    container: '#player',
    url: stream,
    autoplay: true,
    fullscreen: true,
    setting: true,
  });

  const video = art.video;
  const qualitySelect = document.getElementById("quality");

  if (Hls.isSupported()) {

    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

    setupQualitySelector(hls, qualitySelect);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
    });

    hls.on(Hls.Events.ERROR, (_, err) => {
      if (err.fatal && currentIndex < sources.length - 1) {
        loadSource(currentIndex + 1);
      }
    });

  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = stream;
  }
}
</script>

</body>
</html>
