<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player Pro</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: system-ui;
  color: #fff;
}

.player-container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

video {
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  background: black;
}

.controls {
  margin-top: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

button {
  background: #1e293b;
  border: none;
  color: #fff;
  padding: 8px 14px;
  margin: 4px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #334155;
}

button.active {
  background: #22c55e;
}

select {
  background: #1e293b;
  color: #fff;
  border: none;
  padding: 6px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="player-container">
  <h2>🎬 Vyla Player</h2>

  <video id="video" controls></video>

  <div class="controls">
    <div id="sources"></div>

    <br>

    <label>Quality:</label>
    <select id="quality">
      <option value="-1">Auto</option>
    </select>

    <br><br>

    <label>Subtitles:</label>
    <input type="file" id="subtitleUpload" accept=".vtt">
  </div>
</div>

<script>
const BASE = "https://vyla-api.pages.dev";

// GET PARAMS
const params = new URLSearchParams(location.search);
const tmdbId = params.get("id");
const isTv = params.get("type") === "tv";
const season = params.get("season") || 1;
const episode = params.get("episode") || 1;

// VALIDATION (NO DEFAULT 550)
if (!tmdbId) {
  document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
      <h2>❌ Missing TMDB ID</h2>
    </div>
  `;
  throw new Error("Missing TMDB ID");
}

// API URL
const url = isTv
  ? `${BASE}/api/tv?id=${tmdbId}&season=${season}&episode=${episode}`
  : `${BASE}/api/movie?id=${tmdbId}`;

// ELEMENTS
const video = document.getElementById("video");
const sourcesDiv = document.getElementById("sources");
const qualitySelect = document.getElementById("quality");
const subtitleUpload = document.getElementById("subtitleUpload");

let hls = null;
let sources = [];

// FETCH SOURCES
fetch(url)
  .then(r => r.json())
  .then(data => {
    if (!data.sources || !data.sources.length) {
      throw new Error("No sources available");
    }

    sources = data.sources;

    createSourceButtons();
    loadSource(0);
  })
  .catch(err => {
    document.body.innerHTML = `<h2 style="text-align:center">${err.message}</h2>`;
  });

// CREATE SOURCE BUTTONS
function createSourceButtons() {
  sourcesDiv.innerHTML = "";

  sources.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.innerText = s.label;

    btn.onclick = () => {
      document.querySelectorAll("#sources button")
        .forEach(b => b.classList.remove("active"));

      btn.classList.add("active");
      loadSource(i);
    };

    if (i === 0) btn.classList.add("active");

    sourcesDiv.appendChild(btn);
  });
}

// LOAD SOURCE
function loadSource(index) {
  if (hls) {
    hls.destroy();
    hls = null;
  }

  const streamUrl = BASE + sources[index].url;

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(streamUrl);
    hls.attachMedia(video);

    // QUALITY FIX
    hls.on(Hls.Events.MANIFEST_LOADED, () => {
      const levels = hls.levels;

      qualitySelect.innerHTML = '<option value="-1">Auto</option>';

      levels.forEach((l, i) => {
        const label = l.height
          ? `${l.height}p`
          : `${Math.round(l.bitrate / 1000)} kbps`;

        qualitySelect.innerHTML += `<option value="${i}">${label}</option>`;
      });
    });

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
    });

    // AUTO FAILOVER
    hls.on(Hls.Events.ERROR, (_, err) => {
      if (err.fatal && index < sources.length - 1) {
        loadSource(index + 1);
      }
    });

  } else {
    video.src = streamUrl;
  }
}

// QUALITY CHANGE
qualitySelect.onchange = () => {
  if (hls) {
    hls.currentLevel = Number(qualitySelect.value);
  }
};

// SUBTITLE UPLOAD
subtitleUpload.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  const track = document.createElement("track");
  track.kind = "subtitles";
  track.label = file.name;
  track.src = url;
  track.default = true;

  video.appendChild(track);
};
</script>

</body>
</html>
