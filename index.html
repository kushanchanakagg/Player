<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player Fixed</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:#0f172a;
  font-family:system-ui;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

#sources {
  margin-top:15px;
}

button {
  background:#1e293b;
  border:none;
  color:white;
  padding:8px 12px;
  margin:4px;
  border-radius:6px;
  cursor:pointer;
}

button.active {
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎬 Vyla Player (Fixed)</h2>

  <video id="video" controls playsinline></video>

  <div id="sources"></div>
</div>

<script>
const BASE = "https://vyla-api.pages.dev";

const params = new URLSearchParams(location.search);
const id = params.get("id");
const isTv = params.get("type") === "tv";
const season = params.get("season") || 1;
const episode = params.get("episode") || 1;

if (!id) {
  document.body.innerHTML = "<h2 style='text-align:center'>❌ Missing ID</h2>";
  throw new Error("Missing ID");
}

const url = isTv
  ? `${BASE}/api/tv?id=${id}&season=${season}&episode=${episode}`
  : `${BASE}/api/movie?id=${id}`;

const video = document.getElementById("video");
const sourcesDiv = document.getElementById("sources");

let player = new Plyr(video);
let hls = null;
let sources = [];
let currentIndex = 0;

// FETCH SOURCES
fetch(url)
  .then(r => r.json())
  .then(data => {
    if (!data.sources?.length) throw new Error("No sources found");

    sources = data.sources;
    createButtons();
    loadSource(0);
  })
  .catch(err => {
    document.body.innerHTML = `<h2 style="text-align:center">${err.message}</h2>`;
  });

// SOURCE BUTTONS
function createButtons() {
  sourcesDiv.innerHTML = "";

  sources.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.innerText = s.label;

    btn.onclick = () => {
      document.querySelectorAll("#sources button")
        .forEach(b => b.classList.remove("active"));

      btn.classList.add("active");
      loadSource(i);
    };

    if (i === 0) btn.classList.add("active");

    sourcesDiv.appendChild(btn);
  });
}

// LOAD SOURCE (FIXED)
function loadSource(index) {
  currentIndex = index;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  const stream = BASE + sources[index].url;

  // HLS support
  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

    // FIXED QUALITY HANDLING (NO Plyr hacking)
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
    });

  } 
  // Safari fallback
  else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = stream;
  } 
  else {
    alert("HLS not supported");
  }

  // AUTO FAILOVER
  hls?.on(Hls.Events.ERROR, (_, err) => {
    if (err.fatal && currentIndex < sources.length - 1) {
      loadSource(currentIndex + 1);
    }
  });
}
</script>

</body>
</html>
