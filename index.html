<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player (Artplayer Stable)</title>

<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:#0f172a;
  font-family:system-ui;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

#player {
  width:100%;
  height:500px;
  border-radius:12px;
  overflow:hidden;
  background:black;
}

#sources {
  margin-top:15px;
}

button {
  background:#1e293b;
  border:none;
  color:white;
  padding:8px 12px;
  margin:4px;
  border-radius:6px;
  cursor:pointer;
}

button.active {
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎬 Vyla Player</h2>

  <div id="player"></div>
  <div id="sources"></div>
</div>

<script>
const BASE = "https://vyla-api.pages.dev";

const params = new URLSearchParams(location.search);
const id = params.get("id");
const isTv = params.get("type") === "tv";
const season = params.get("season") || 1;
const episode = params.get("episode") || 1;

if (!id) {
  document.body.innerHTML = "<h2 style='text-align:center'>❌ Missing ID</h2>";
  throw new Error("Missing ID");
}

const url = isTv
  ? `${BASE}/api/tv?id=${id}&season=${season}&episode=${episode}`
  : `${BASE}/api/movie?id=${id}`;

let art;
let hls;
let sources = [];
let currentIndex = 0;

// FETCH SOURCES
fetch(url)
  .then(r => r.json())
  .then(data => {
    if (!data.sources?.length) throw new Error("No sources found");

    sources = data.sources;
    createButtons();
    loadSource(0);
  })
  .catch(err => {
    document.body.innerHTML = `<h2 style="text-align:center">${err.message}</h2>`;
  });

// SOURCE BUTTONS
function createButtons() {
  const div = document.getElementById("sources");
  div.innerHTML = "";

  sources.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.innerText = s.label;

    btn.onclick = () => {
      document.querySelectorAll("#sources button")
        .forEach(b => b.classList.remove("active"));

      btn.classList.add("active");
      loadSource(i);
    };

    if (i === 0) btn.classList.add("active");

    div.appendChild(btn);
  });
}

// LOAD SOURCE (STABLE VERSION)
function loadSource(index) {
  currentIndex = index;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  const stream = BASE + sources[index].url;

  if (art) {
    art.destroy();
  }

  art = new Artplayer({
    container: '#player',
    url: stream,
    autoplay: true,
    fullscreen: true,
    setting: true,
  });

  const video = art.video;

  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
    });

    // AUTO FAILOVER
    hls.on(Hls.Events.ERROR, (_, err) => {
      if (err.fatal && currentIndex < sources.length - 1) {
        loadSource(currentIndex + 1);
      }
    });
  }
}
</script>

</body>
</html>
