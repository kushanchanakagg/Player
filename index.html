<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">

<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-hls-control/dist/artplayer-plugin-hls-control.js"></script>

<style>
body {
  margin:0;
  background:#0f172a;
  font-family:system-ui;
  color:white;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

#player {
  width:100%;
  height:520px;
  border-radius:12px;
  overflow:hidden;
  background:black;
}

#sources {
  margin-top:15px;
}

button {
  background:#1e293b;
  border:none;
  color:white;
  padding:8px 12px;
  margin:4px;
  border-radius:6px;
  cursor:pointer;
}

button.active {
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎬 Vyla Player (Pro)</h2>

  <div id="player"></div>
  <div id="sources"></div>
</div>

<script>
const BASE = "https://vyla-api.pages.dev";

const params = new URLSearchParams(location.search);
const id = params.get("id");
const type = params.get("type");
const season = params.get("season") || 1;
const episode = params.get("episode") || 1;

if (!id) {
  document.body.innerHTML = "<h2 style='text-align:center'>❌ Missing ID</h2>";
  throw new Error("Missing ID");
}

// API
const url = type === "tv"
  ? `${BASE}/api/tv?id=${id}&season=${season}&episode=${episode}`
  : `${BASE}/api/movie?id=${id}`;

let sources = [];
let currentIndex = 0;
let art;

// FETCH SOURCES
fetch(url)
  .then(r => r.json())
  .then(data => {
    if (!data.sources?.length) throw new Error("No sources found");

    sources = data.sources;

    createButtons();
    loadSource(0);
  })
  .catch(err => {
    document.body.innerHTML = `<h2 style="text-align:center">${err.message}</h2>`;
  });

// SOURCE BUTTONS
function createButtons() {
  const div = document.getElementById("sources");
  div.innerHTML = "";

  sources.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.innerText = s.label;

    btn.onclick = () => {
      document.querySelectorAll("#sources button")
        .forEach(b => b.classList.remove("active"));

      btn.classList.add("active");
      loadSource(i);
    };

    if (i === 0) btn.classList.add("active");

    div.appendChild(btn);
  });
}

// LOAD PLAYER
function loadSource(index) {
  currentIndex = index;

  const stream = BASE + sources[index].url;

  if (art) art.destroy();

  art = new Artplayer({
    container: '#player',
    url: stream,
    autoplay: true,
    fullscreen: true,
    setting: true,

    plugins: [
      artplayerPluginHlsControl({
        quality: {
          control: true,
          setting: true,
          title: 'Quality',
          auto: 'Auto',
          getName: (level) => `${level.height}p`,
        },
        audio: {
          control: true,
          setting: true,
          title: 'Audio',
          auto: 'Auto',
          getName: (track) => track.name || 'Track',
        },
      }),
    ],

    customType: {
      m3u8: function (video, url, art) {

        if (Hls.isSupported()) {

          if (art.hls) art.hls.destroy();

          const hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true
          });

          hls.loadSource(url);
          hls.attachMedia(video);

          art.hls = hls;

          art.on('destroy', () => hls.destroy());

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
        } else {
          art.notice.show = 'M3U8 not supported';
        }
      }
    }
  });

}
</script>

</body>
</html>
