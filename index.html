<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">

<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
}
.artplayer-app {
  width: 100%;
  height: 100vh;
}
</style>
</head>

<body>

<div class="artplayer-app"></div>

<script>
const BASE = "https://vyla-api.pages.dev";
const id = new URLSearchParams(location.search).get("id");

if (!id) throw new Error("Missing ID");

fetch(`${BASE}/api/movie?id=${id}`)
  .then(r => r.json())
  .then(data => {
    const streamUrl = BASE + data.sources[0].url;
    createPlayer(streamUrl);
  });

function createPlayer(streamUrl) {

  const art = new Artplayer({
    container: '.artplayer-app',
    url: streamUrl,
    autoplay: true,
    setting: false,

    controls: [
      {
        name: 'quality',
        position: 'right',
        html: 'Quality',
        tooltip: 'Select Quality',

        selector: [],

        onSelect(item) {
          if (art.hls) {
            art.hls.currentLevel = item.value;
          }
          return item.html;
        },

        mounted(_, element) {
          const hls = art.hls;
          if (!hls) return;

          const build = (levels) => {
            this.selector = [
              { html: 'Auto', value: -1, default: true },
              ...levels.map((l, i) => ({
                html: `${l.height}p`,
                value: i
              }))
            ];
          };

          if (hls.levels && hls.levels.length) {
            build(hls.levels);
          } else {
            hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
              build(data.levels);
            });
          }
        }
      }
    ],

    customType: {
      m3u8(video, url, art) {

        if (Hls.isSupported()) {

          if (art.hls) art.hls.destroy();

          const hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true
          });

          art.hls = hls;

          hls.loadSource(url);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
          });

          art.on('destroy', () => hls.destroy());

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
        } else {
          art.notice.show = 'M3U8 not supported';
        }
      }
    }
  });

}
</script>

</body>
</html>
