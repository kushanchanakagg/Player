<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player Pro</title>

<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:#0f172a;
  font-family:system-ui;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

#player {
  width:100%;
  height:500px;
  border-radius:12px;
  overflow:hidden;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎬 Vyla Player</h2>
  <div id="player"></div>
</div>

<script>
const BASE = "https://vyla-api.pages.dev";

const params = new URLSearchParams(location.search);
const id = params.get("id");
const isTv = params.get("type") === "tv";
const season = params.get("season") || 1;
const episode = params.get("episode") || 1;

if (!id) {
  document.body.innerHTML = "Missing ID";
  throw new Error("Missing ID");
}

const url = isTv
  ? `${BASE}/api/tv?id=${id}&season=${season}&episode=${episode}`
  : `${BASE}/api/movie?id=${id}`;

let art;
let hls;
let sources = [];
let currentIndex = 0;

// FETCH SOURCES
fetch(url)
  .then(r => r.json())
  .then(data => {
    sources = data.sources;
    loadSource(0);
  });

// LOAD SOURCE
function loadSource(index) {
  currentIndex = index;

  if (hls) hls.destroy();
  if (art) art.destroy();

  const stream = BASE + sources[index].url;

  art = new Artplayer({
    container: '#player',
    url: stream,
    autoplay: true,
    fullscreen: true,
    setting: true, // 🔥 IMPORTANT
  });

  const video = art.video;

  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

    // 🔥 QUALITY INSIDE ARTPLAYER SETTINGS MENU
    hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {

      const levels = [
        { html: 'Auto', value: -1 }
      ];

      data.levels.forEach((level, i) => {
        levels.push({
          html: level.height ? level.height + 'p' : 'Auto',
          value: i
        });
      });

      art.update({
        settings: [
          {
            html: 'Quality',
            selector: levels,
            onSelect: (item) => {
              hls.currentLevel = item.value;
              return item.html;
            }
          }
        ]
      });

      video.play().catch(() => {});
    });

    hls.on(Hls.Events.ERROR, (_, err) => {
      if (err.fatal && currentIndex < sources.length - 1) {
        loadSource(currentIndex + 1);
      }
    });

  } else {
    video.src = stream;
  }
}
</script>

</body>
</html>
