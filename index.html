<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">

<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-hls-control/dist/artplayer-plugin-hls-control.js"></script>

<style>
body {
  margin:0;
  background:#0f172a;
}

.artplayer-app {
  width:100%;
  height:100vh;
}
</style>
</head>

<body>

<div class="artplayer-app"></div>

<script>
const BASE = "https://vyla-api.pages.dev";

const params = new URLSearchParams(location.search);
const id = params.get("id");

if (!id) {
  document.body.innerHTML = "Missing ID";
  throw new Error("Missing ID");
}

const url = `${BASE}/api/movie?id=${id}`;

fetch(url)
  .then(r => r.json())
  .then(data => {
    const stream = BASE + data.sources[0].url;
    initPlayer(stream);
  });

function initPlayer(streamUrl) {

  const art = new Artplayer({
    container: '.artplayer-app',
    url: streamUrl,
    autoplay: true,
    setting: true,
    fullscreen: true,

    // 🔥 PLUGIN (THIS IS WHAT FIXES QUALITY MENU INSIDE PLAYER)
    plugins: [
      artplayerPluginHlsControl({
        quality: {
          control: true,
          setting: true,
          title: 'Quality',
          auto: 'Auto',
          getName: (level) => level.height ? `${level.height}P` : 'Auto',
        },
        audio: {
          control: true,
          setting: true,
          title: 'Audio',
          auto: 'Auto',
          getName: (track) => track.name || 'Track',
        },
      }),
    ],

    // 🔥 PROPER HLS HANDLER
    customType: {
      m3u8(video, url, art) {

        if (Hls.isSupported()) {

          if (art.hls) art.hls.destroy();

          const hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
          });

          art.hls = hls;

          hls.loadSource(url);
          hls.attachMedia(video);

          // IMPORTANT: ensure levels are ready
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
          });

          art.on('destroy', () => {
            hls.destroy();
          });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
        } else {
          art.notice.show = 'M3U8 not supported';
        }
      }
    }
  });

}
</script>

</body>
</html>
