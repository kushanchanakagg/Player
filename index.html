<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Player</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">

<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:#0f172a; }
#player { width:100%; height:100vh; }
.controls {
  position:fixed;
  top:10px;
  right:10px;
  z-index:999;
}
select {
  background:#1e293b;
  color:white;
  padding:6px;
}
</style>
</head>

<body>

<div id="player"></div>

<div class="controls">
  <select id="quality">
    <option value="-1">Auto</option>
  </select>
</div>

<script>
const BASE = "https://vyla-api.pages.dev";

const id = new URLSearchParams(location.search).get("id");

let hls;
let art;

fetch(`${BASE}/api/movie?id=${id}`)
  .then(r => r.json())
  .then(data => {
    init(BASE + data.sources[0].url);
  });

function setupQualitySelector(hls, selectEl) {

  hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {

    selectEl.innerHTML = '<option value="-1">Auto</option>';

    data.levels.forEach((level, i) => {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = level.height ? `${level.height}p` : "Auto";
      selectEl.appendChild(opt);
    });

    selectEl.onchange = () => {
      hls.currentLevel = Number(selectEl.value);
    };
  });

  hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
    selectEl.value = hls.autoLevelEnabled ? -1 : data.level;
  });
}

function init(url) {

  art = new Artplayer({
    container: '#player',
    url,
    autoplay: true,
    setting: false
  });

  const video = art.video;
  const select = document.getElementById("quality");

  if (Hls.isSupported()) {

    hls = new Hls({
      enableWorker: true
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    setupQualitySelector(hls, select);

  } else {
    video.src = url;
  }
}
</script>

</body>
</html>
