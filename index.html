<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyla Player Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">

<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:#0f172a; }
.artplayer-app { width:100%; height:100vh; }
</style>
</head>

<body>

<div class="artplayer-app"></div>

<script>
const BASE = "https://vyla-api.pages.dev";
const id = new URLSearchParams(location.search).get("id");

if (!id) throw new Error("Missing ID");

fetch(`${BASE}/api/movie?id=${id}`)
  .then(r => r.json())
  .then(data => {
    createPlayer(BASE + data.sources[0].url);
  });

function createPlayer(streamUrl) {

  const art = new Artplayer({
    container: '.artplayer-app',
    url: streamUrl,
    autoplay: true,
    setting: false,

    controls: [
      {
        name: 'quality',
        position: 'right',
        html: 'Quality',
        tooltip: 'Select Quality',

        selector: [],

        onSelect(item) {
          if (art.hls) {
            art.hls.currentLevel = item.value;
          }
          return item.html;
        },

        mounted(_, el) {

          const hls = art.hls;
          if (!hls) return;

          const build = (levels) => {

            // SAME LOGIC YOU WROTE
            this.selector = [
              {
                html: 'Auto',
                value: -1,
                default: true,
              },
              ...levels.map((level, i) => ({
                html: `${level.height}p (${Math.round(level.bitrate / 1000)}kbps)`,
                value: i
              }))
            ];
          };

          hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
            build(data.levels);
          });

          hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
            const current = hls.autoLevelEnabled ? -1 : data.level;

            const item = this.selector.find(i => i.value === current);
            if (item) this.current = item;
          });

        }
      }
    ],

    customType: {
      m3u8(video, url, art) {

        if (Hls.isSupported()) {

          if (art.hls) art.hls.destroy();

          const hls = new Hls({
            enableWorker: true
          });

          art.hls = hls;

          hls.loadSource(url);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
          });

          art.on('destroy', () => hls.destroy());

        } else {
          video.src = url;
        }
      }
    }
  });

}
</script>

</body>
</html>
